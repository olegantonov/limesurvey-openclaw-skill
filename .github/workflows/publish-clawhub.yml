name: Publish to ClawhHub

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawhHub CLI
        run: npm install -g clawhub

      - name: Publish skill
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub publish . --slug limesurvey-openclaw-skill --name "Limesurvey Openclaw Skill" --no-input
